global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Всегда доступна цель для проверки стека без приложения
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # Backend бота на хосте (Docker Desktop / Linux с host-gateway).
  # Если API не запущен — target будет DOWN, это нормально.
  - job_name: telegram-support-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
