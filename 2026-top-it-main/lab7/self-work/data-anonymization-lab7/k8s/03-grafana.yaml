apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: sda-observability
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Lab7
        orgId: 1
        folder: Lab7
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
  sda-backend.json: |
    {
      "title": "SDA Backend / Lab7",
      "uid": "sda-backend-lab7-k8s",
      "schemaVersion": 40,
      "version": 1,
      "refresh": "10s",
      "time": {"from": "now-15m", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "HTTP request rate",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{"expr": "sum(rate(sda_http_requests_total[1m])) by (route)", "legendFormat": "{{route}}"}]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "HTTP latency p95",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(sda_http_request_duration_seconds_bucket[5m])) by (le, route))", "legendFormat": "p95 {{route}}"}]
        },
        {
          "id": 3,
          "type": "barchart",
          "title": "Business events",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [{"expr": "sum(sda_business_events_total) by (event)", "legendFormat": "{{event}}"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sda-observability
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: provisioning
              mountPath: /var/lib/grafana/dashboards/sda-backend.json
              subPath: sda-backend.json
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sda-observability
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http

