apiVersion: apps/v1
kind: Deployment
metadata:
  name: sda-backend
  labels:
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sda
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sda
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: sda-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: sda-config
            - secretRef:
                name: sda-secret
          volumeMounts:
            - name: upload-store
              mountPath: /tmp/sda_upload_store
            - name: analysis-store
              mountPath: /tmp/sda_similar_analysis_store
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: upload-store
          persistentVolumeClaim:
            claimName: sda-upload-store
        - name: analysis-store
          persistentVolumeClaim:
            claimName: sda-analysis-store
---
apiVersion: v1
kind: Service
metadata:
  name: sda-backend
  labels:
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: sda
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP

