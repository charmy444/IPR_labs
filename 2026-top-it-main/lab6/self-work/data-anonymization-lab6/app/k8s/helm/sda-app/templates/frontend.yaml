apiVersion: apps/v1
kind: Deployment
metadata:
  name: sda-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: sda
    app.kubernetes.io/component: frontend
    {{- if .Values.environment }}
    environment: {{ .Values.environment | quote }}
    {{- end }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sda
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sda
        app.kubernetes.io/component: frontend
        {{- if .Values.environment }}
        environment: {{ .Values.environment | quote }}
        {{- end }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sda-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: sda
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: sda
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
  type: ClusterIP

