{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sda
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: sda
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sda-backend
                port:
                  name: http
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: sda-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sda-frontend
                port:
                  name: http
{{- end }}

