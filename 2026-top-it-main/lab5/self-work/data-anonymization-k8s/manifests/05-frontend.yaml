apiVersion: apps/v1
kind: Deployment
metadata:
  name: sda-frontend
  namespace: sda-lab5
  labels:
    app.kubernetes.io/name: sda
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sda
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sda
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: sda-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sda-frontend
  namespace: sda-lab5
  labels:
    app.kubernetes.io/name: sda
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: sda
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
  type: ClusterIP

