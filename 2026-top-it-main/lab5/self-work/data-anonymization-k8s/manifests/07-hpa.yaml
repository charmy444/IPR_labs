apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sda-backend
  namespace: sda-lab5
  labels:
    app.kubernetes.io/name: sda
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sda-backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

