# Локальный стек наблюдаемости (лаб. 7). Подключать вместе с docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
services:
  backend:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_SERVICE_NAME: telegram-support-backend

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: telegram-support-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - backend
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: telegram-support-tempo
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: telegram-support-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped
