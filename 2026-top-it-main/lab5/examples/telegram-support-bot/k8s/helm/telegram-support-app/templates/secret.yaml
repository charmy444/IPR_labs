{{- $built := printf "postgres://%s:%s@%s:%d/%s?sslmode=disable" .Values.database.user .Values.database.password .Values.database.host (int .Values.database.port) .Values.database.name }}
{{- $dbUrl := .Values.database.url | default $built }}
apiVersion: v1
kind: Secret
metadata:
  name: telegram-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: telegram-support-bot
    component: secrets
    {{- range $k, $v := .Values.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- if .Values.environment }}
    environment: {{ .Values.environment | quote }}
    {{- end }}
type: Opaque
stringData:
  bot-token: {{ .Values.telegram.botToken | quote }}
  database-url: {{ $dbUrl | quote }}
