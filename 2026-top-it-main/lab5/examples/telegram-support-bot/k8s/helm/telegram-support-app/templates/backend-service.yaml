apiVersion: v1
kind: Service
metadata:
  name: telegram-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: telegram-support-bot
    component: backend
    {{- range $k, $v := .Values.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- if .Values.environment }}
    environment: {{ .Values.environment | quote }}
    {{- end }}
spec:
  selector:
    app: telegram-support-bot
    component: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
