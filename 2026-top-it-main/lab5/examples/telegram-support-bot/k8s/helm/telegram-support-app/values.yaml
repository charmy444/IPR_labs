# Значения по умолчанию. Для окружений используйте values-dev.yaml / values-prod.yaml.

environment: ""

imagePullPolicy: IfNotPresent

frontend:
  image:
    repository: telegram-support-bot-frontend
    tag: latest
  replicas: 2
  resources:
    requests:
      memory: 64Mi
      cpu: 250m
    limits:
      memory: 128Mi
      cpu: 500m

backend:
  image:
    repository: telegram-support-bot-backend
    tag: latest
  replicas: 2
  resources:
    requests:
      memory: 64Mi
      cpu: 250m
    limits:
      memory: 128Mi
      cpu: 500m

# URL API для Next.js внутри кластера
config:
  nextPublicApiUrl: "http://telegram-backend:8080"

# Строка подключения к БД: задайте целиком или соберите из полей ниже (см. templates/secret.yaml).
database:
  url: ""
  host: "postgres-0.postgres"
  port: 5432
  name: support_bot
  user: postgres
  password: postgres

telegram:
  botToken: "REPLACE_WITH_YOUR_TELEGRAM_BOT_TOKEN"

labels:
  "course.lab/example": telegram-support-app
