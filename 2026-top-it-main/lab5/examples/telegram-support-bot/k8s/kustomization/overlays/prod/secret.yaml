apiVersion: v1
kind: Secret
metadata:
  name: telegram-secrets
  labels:
    app: telegram-support-bot
    component: secrets
type: Opaque
stringData:
  bot-token: "REPLACE_WITH_YOUR_TELEGRAM_BOT_TOKEN"
  # БД в namespace telegram-demo, приложение — в telegram-prod (пример меж-namespace контракта).
  database-url: "postgres://postgres:postgres@postgres-0.postgres.telegram-demo.svc.cluster.local:5432/support_bot?sslmode=disable"
