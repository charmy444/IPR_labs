apiVersion: v1
kind: Secret
metadata:
  name: telegram-secrets
  labels:
    app: telegram-support-bot
    component: secrets
type: Opaque
stringData:
  # Получите токен у @BotFather; для учебного стенда не коммитьте реальные секреты.
  bot-token: "REPLACE_WITH_YOUR_TELEGRAM_BOT_TOKEN"
  # Согласовано с lab6/examples/telegram-support-infra (overlay dev, namespace telegram-demo).
  database-url: "postgres://postgres:postgres@postgres-0.postgres:5432/support_bot?sslmode=disable"
